<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 素材工具箱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0f0f1a;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:2rem;font-weight:700;margin-bottom:8px;background:linear-gradient(90deg,#7c6fff,#ff6fb0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#888;margin-bottom:48px;font-size:0.95rem}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:1100px}
.card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:32px 28px;width:300px;text-decoration:none;color:inherit;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#7c6fff;box-shadow:0 8px 32px rgba(124,111,255,.25)}
.card-icon{font-size:3rem;margin-bottom:16px}
.card-title{font-size:1.2rem;font-weight:600;margin-bottom:8px}
.card-desc{color:#888;font-size:0.88rem;line-height:1.6}
.badge{display:inline-block;background:#7c6fff22;color:#a89fff;border:1px solid #7c6fff55;border-radius:20px;padding:2px 10px;font-size:0.75rem;margin-top:12px}
footer{margin-top:48px;color:#444;font-size:0.8rem}
</style>
</head>
<body>
<h1>🚀 AI 素材工具箱</h1>
<p class="sub">版本组专属 · 真实输出 · 局域网共享</p>
<div class="cards">
  <a class="card" href="/kv-tool.html">
    <div class="card-icon">🖼️</div>
    <div class="card-title">KV 延展工具</div>
    <div class="card-desc">上传主视觉 KV，自动裁剪缩放为多种尺寸物料，支持 PSD/PSB 上传，输出 PNG/JPG/PSD 分层。</div>
    <span class="badge">✅ 本地处理不上传</span>
  </a>
  <a class="card" href="/material-composer.html">
    <div class="card-icon">🎨</div>
    <div class="card-title">卖点图组合工具</div>
    <div class="card-desc">上传主KV、人物立绘、实机截图，选择边框风格，多图层组合排版，支持5种输出规格。</div>
    <span class="badge">✅ 实时Canvas预览</span>
  </a>
  <a class="card" href="/video-composer.html">
    <div class="card-icon">🎬</div>
    <div class="card-title">视频合成工具</div>
    <div class="card-desc">上传多段视频片段，自动合并 + 叠加 Logo + 加入背景音乐，一键下载最终 MP4。</div>
    <span class="badge">⚠️ 需本地服务支持</span>
  </a>
</div>
<footer>内部工具 · 仅限办公网使用</footer>
</body>
</html>
